# ================================================
# SERVER CONFIGURATION
# ================================================
server.port=9010
# ================================================
# MYSQL DATABASE CONFIGURATION
# ================================================
# Change username/password to match YOUR MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_management_db1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Yashu@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================================
# JPA / HIBERNATE CONFIGURATION
# ================================================
# update = creates tables if not exist, updates if changed
# Use 'create-drop' only in dev to reset DB every restart
# Use 'validate' in production (never auto-modify prod DB)
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in console — useful for debugging
spring.jpa.show-sql=true

# Makes SQL output readable/indented in console
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# MySQL-specific SQL dialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================================
# JWT CONFIGURATION
# ================================================
# Secret key: must be a long random string in production
# Never commit real secrets to Git!
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ================================================
# FILE UPLOAD CONFIGURATION
# ================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Folder where hotel images will be stored
app.file.upload-dir=uploads/hotels

# ================================================
# LOGGING CONFIGURATION
# ================================================
logging.level.com.hotel.management=DEBUG
logging.level.org.springframework.security=DEBUG

# ================================================
# SPRING APPLICATION NAME
# ================================================
spring.application.name=hotel-management-system